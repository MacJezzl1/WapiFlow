version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: wapiflow-postgres
    environment:
      POSTGRES_USER: wapiflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wapiflow_dev_password}
      POSTGRES_DB: wapiflow
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wapiflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wapiflow

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: wapiflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wapiflow

  # Ollama - Free Powerful LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: wapiflow-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - wapiflow
    command: serve

  # WapiFlow API Server
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: wapiflow-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://wapiflow:${DB_PASSWORD:-wapiflow_dev_password}@postgres:5432/wapiflow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
      OLLAMA_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-dev_token}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
      - ./packages/shared/src:/app/packages/shared/src
    networks:
      - wapiflow

  # WapiFlow Dashboard (React)
  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    container_name: wapiflow-dashboard
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_OLLAMA_URL: http://localhost:11434
    depends_on:
      - api
    volumes:
      - ./apps/dashboard/src:/app/src
    networks:
      - wapiflow

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: wapiflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - wapiflow

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  wapiflow:
    driver: bridge
